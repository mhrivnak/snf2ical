# Example nginx configuration for serving snf2ical website with TLS.
#
# Prerequisites:
#   - Obtain a TLS certificate, e.g. via Let's Encrypt:
#       certbot certonly --nginx -d example.com
#   - Replace "example.com" with your actual domain throughout this file.
#   - Place the static site files (from the website/ directory) at the
#     root path specified below, e.g. /var/www/snf2ical.
#   - Place the generated .ics files alongside the HTML files so they
#     can be downloaded by visitors.

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # Redirect all HTTP traffic to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # HSTS: tell browsers to always use HTTPS for this domain.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    root /var/www/snf2ical;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Set appropriate content type for iCalendar files.
    location ~* \.ics$ {
        add_header Content-Type text/calendar;
        add_header Content-Disposition "attachment";
    }
}
