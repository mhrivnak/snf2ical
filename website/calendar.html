<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnF Schedule – Calendar View</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6/index.global.min.js"></script>
    <style>
      /* Reset simple.css table styles inside the FullCalendar container so they
         don't interfere with FullCalendar's own rendering. */
      #calendar table,
      #calendar thead,
      #calendar tbody,
      #calendar tr,
      #calendar th,
      #calendar td {
        border: unset;
        padding: unset;
        text-align: unset;
        background: unset;
      }

      #filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      #filters label {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        cursor: pointer;
        font-size: 0.9rem;
      }
    </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">Home</a>
      <a href="/calendar.html">Calendar</a>
      <a href="/details.html">Details</a>
    </nav>

    <h1>SnF Schedule</h1>
    <p>Usable calendars for the Sun 'n Fun Aerospace Expo</p>
  </header>

  <main>
    <div id="filters">
      <label><input type="checkbox" data-source="forums"        checked> Forums</label>
      <label><input type="checkbox" data-source="workshops"     checked> Workshops</label>
      <label><input type="checkbox" data-source="presentations" checked> Interviews &amp; Presentations</label>
      <label><input type="checkbox" data-source="facilities"    checked> Facilities</label>
      <label><input type="checkbox" data-source="other"         checked> Other</label>
    </div>
    <div id="calendar"></div>
  </main>

  <footer>
    <p>Copyright &copy; 2026 Michael Hrivnak</p>
  </footer>

  <script>
    (async () => {
      const sources = {
        forums:        { url: '/ical/forums.ics',        color: '#1a73e8', label: 'Forums' },
        workshops:     { url: '/ical/workshops.ics',     color: '#e67c00', label: 'Workshops' },
        presentations: { url: '/ical/presentations.ics', color: '#0f9d58', label: 'Interviews & Presentations' },
        facilities:    { url: '/ical/facilities.ics',    color: '#9e9e9e', label: 'Facilities' },
        other:         { url: '/ical/other.ics',         color: '#7b1fa2', label: 'Other' },
      };

      const meta = await fetch('/ical/meta.json').then(r => r.json());

      const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'timeGridWeek',
        initialDate: meta.expoStart,
        headerToolbar: {
          left:   'prev,next today',
          center: 'title',
          right:  'timeGridWeek,timeGridDay',
        },
        eventSources: Object.entries(sources).map(([id, s]) => ({
          id:     id,
          url:    s.url,
          format: 'ics',
          color:  s.color,
        })),
      });
      calendar.render();

      // Checkbox filtering: remove or re-add event sources by ID.
      document.querySelectorAll('#filters input[type=checkbox]').forEach(cb => {
        cb.addEventListener('change', () => {
          const id  = cb.dataset.source;
          const src = sources[id];
          if (cb.checked) {
            calendar.addEventSource({ id, url: src.url, format: 'ics', color: src.color });
          } else {
            calendar.getEventSourceById(id)?.remove();
          }
        });
      });
    })();
  </script>
</body>
</html>
