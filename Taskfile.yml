version: '3'

vars:
  BINARY_NAME: snf2ical
  BUILD_DIR: .
  CMD_DIR: ./cmd

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BINARY_NAME}} {{.CMD_DIR}}/snf2ical.go
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY_NAME}}"

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -v -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}
      - rm -f coverage.out coverage.html
      - rm -f *.ics

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint (if installed)
    cmds:
      - golangci-lint run ./...
    preconditions:
      - sh: command -v golangci-lint
        msg: "golangci-lint is not installed. Install from https://golangci-lint.run/usage/install/"

  vendor:
    desc: Update vendored dependencies
    cmds:
      - go mod tidy
      - go mod vendor

  run:
    desc: Run the application with example flags
    cmds:
      - go run {{.CMD_DIR}}/snf2ical.go --help

  install:
    desc: Install the binary to $GOPATH/bin
    cmds:
      - go install {{.CMD_DIR}}/snf2ical.go

  check:
    desc: Run fmt, vet, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test
